<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect - Marketplace Jasa IT Mahasiswa</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>
    
    <!-- CUSTOM LIQUID GLASS & THEME CSS -->
    <style>
        /* =========================================
           CORE RESETS & Z-INDEX FIXED
           ========================================= */
        nav#navbar { z-index: 99999 !important; }
        .dropdown-menu { z-index: 100000 !important; }

        .gradient-text {
            background: linear-gradient(135deg, #22d3ee, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* =========================================
           THEME 1: PURE DARK MODE (DEFAULT)
           ========================================= */
        body {
            background-color: #000000 !important; /* Hitam Pekat */
            color: #ffffff !important; /* Font Putih Bersih */
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Maximum Liquid Glass Dark */
        .glass-nav {
            background: rgba(0, 0, 0, 0.45) !important;
            backdrop-filter: blur(35px) saturate(220%) !important;
            -webkit-backdrop-filter: blur(35px) saturate(220%) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12) !important;
        }

        .glass-card, .dropdown-menu {
            background: rgba(15, 15, 15, 0.45) !important;
            backdrop-filter: blur(32px) saturate(200%) !important;
            -webkit-backdrop-filter: blur(32px) saturate(200%) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.12) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.04) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04) !important;
            box-shadow: 0 15px 45px -10px rgba(0, 0, 0, 0.8) !important;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        /* Card Interactive Hover Animation */
        .project-card:hover, .category-card:hover {
            background: rgba(30, 30, 30, 0.6) !important;
            border-top: 1px solid rgba(6, 182, 212, 0.6) !important;
            border-left: 1px solid rgba(6, 182, 212, 0.4) !important;
            transform: translateY(-6px) scale(1.01) !important;
            box-shadow: 0 25px 50px -12px rgba(6, 182, 212, 0.3) !important;
        }

        /* Dropdown Items */
        .dropdown-item {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 12px 16px !important;
            font-size: 0.875rem !important;
            color: #e2e8f0 !important;
            transition: all 0.3s ease !important;
            width: calc(100% - 12px) !important;
            margin: 4px 6px !important;
            border-radius: 14px !important;
            text-align: left !important;
            background: transparent !important;
        }
        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.12) !important;
            color: #ffffff !important;
            transform: translateX(6px) !important;
        }

        /* Inputs Premium Glow */
        .form-input {
            width: 100% !important;
            border-radius: 16px !important;
            padding: 12px 16px !important;
            font-size: 0.875rem !important;
            transition: all 0.3s ease !important;
            background: rgba(255, 255, 255, 0.05) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }
        .form-input:focus {
            background: rgba(0, 0, 0, 0.6) !important;
            border-color: #06b6d4 !important;
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.25) !important;
            outline: none !important;
        }

        /* =========================================
           THEME 2: PURE LIGHT MODE 
           ========================================= */
        body.light-mode {
            background-color: #ffffff !important; /* Putih Bersih */
            color: #000000 !important; /* Font Hitam Pekat */
        }
        
        body.light-mode .hero-grid {
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.04) 1px, transparent 1px) !important;
        }

        /* Maximum Liquid Glass Light */
        body.light-mode .glass-nav {
            background: rgba(255, 255, 255, 0.5) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1) !important;
        }

        body.light-mode .glass-card, body.light-mode .dropdown-menu {
            background: rgba(255, 255, 255, 0.45) !important;
            backdrop-filter: blur(35px) saturate(240%) !important;
            -webkit-backdrop-filter: blur(35px) saturate(240%) !important;
            border-top: 1px solid rgba(255, 255, 255, 1) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.8) !important;
            border-right: 1px solid rgba(0, 0, 0, 0.05) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.08) !important;
        }

        body.light-mode .glass-card:hover {
            background: rgba(255, 255, 255, 0.8) !important;
            border-top: 1px solid rgba(6, 182, 212, 0.6) !important;
            border-left: 1px solid rgba(6, 182, 212, 0.4) !important;
            box-shadow: 0 20px 40px -10px rgba(6, 182, 212, 0.2) !important;
        }

        /* Force Font Menyesuaikan Warna Tema di Light Mode */
        body.light-mode .text-white { color: #000000 !important; }
        body.light-mode .text-slate-200 { color: #111111 !important; }
        body.light-mode .text-slate-300 { color: #222222 !important; }
        body.light-mode .text-slate-400 { color: #444444 !important; }
        body.light-mode .text-slate-500 { color: #666666 !important; }

        body.light-mode .dropdown-item { color: #222222 !important; }
        body.light-mode .dropdown-item:hover {
            background: rgba(0, 0, 0, 0.06) !important;
            color: #000000 !important;
        }

        body.light-mode .form-input {
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.12) !important;
            color: #000000 !important;
        }
        body.light-mode .form-input:focus {
            background: #ffffff !important;
            border-color: #06b6d4 !important;
        }

        /* Reset Background Transparan Bawaan Struktur Lama */
        body.light-mode .bg-navy-950, body.light-mode .bg-navy-900, body.light-mode .bg-white\/5 {
            background-color: transparent !important;
        }
        body.light-mode .border-white\/10 {
            border-color: rgba(0, 0, 0, 0.08) !important;
        }

        /* =========================================
           ANIMATIONS & BG INTERACTIVE MESH
           ========================================= */
        .hero-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPan 25s linear infinite;
        }
        @keyframes gridPan {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        /* Full Screen Pop Animation ala iOS View Controller */
        .fade-in { animation: iosPop 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes iosPop {
            from { opacity: 0; transform: translateY(16px) scale(0.99); filter: blur(6px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
    </style>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-navy-950 text-slate-200 min-h-screen flex flex-col font-sans antialiased selection:bg-cyan-500/30 selection:text-cyan-200 transition-colors duration-700">

    <div class="hero-grid"></div>

    <!-- Navigation Bar -->
    <nav id="navbar" class="fixed top-0 w-full glass-nav transition-all duration-500"></nav>

    <!-- Main Application Root -->
    <main id="app-root" class="flex-grow pt-20 pb-10"></main>

    <!-- Global Components -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-3"></div>
    
    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-navy-950/40 backdrop-blur-md z-[70] hidden items-center justify-center p-4 transition-all duration-300">
        <div id="modal-body" class="w-full max-w-lg transform scale-95 opacity-0 transition-all duration-300"></div>
    </div>

    <!-- Application Scripts -->
    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
    
    <!-- Initialize App & Inject Theme Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Modifikasi halus UI.renderNav untuk menyuntikkan tombol Theme
            const originalRenderNav = UI.renderNav;
            UI.renderNav = function() {
                originalRenderNav.apply(this, arguments);
                
                // Cari container sisi kanan di dalam navbar
                const navRight = document.querySelector('.nav-container .flex.items-center.gap-2') || 
                                 document.querySelector('.nav-container .flex.items-center.gap-3');
                
                if (navRight && !document.getElementById('theme-toggle-btn')) {
                    const btn = document.createElement('button');
                    btn.id = 'theme-toggle-btn';
                    btn.className = 'w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/20 border border-white/10 transition-all backdrop-blur-md ml-1 sm:ml-2';
                    
                    const isLight = document.body.classList.contains('light-mode');
                    btn.innerHTML = isLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400"></i>';
                    
                    // Logika pergantian tema
                    btn.onclick = () => {
                        document.body.classList.toggle('light-mode');
                        const nowLight = document.body.classList.contains('light-mode');
                        
                        // Efek pergantian Icon
                        btn.innerHTML = nowLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500 drop-shadow-md"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400 drop-shadow-md"></i>';
                        btn.style.borderColor = nowLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
                        btn.style.background = nowLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
                        
                        lucide.createIcons({nodes: [btn]});
                        
                        // Simpan preferensi di LocalStorage (Opsional)
                        localStorage.setItem('itconnect_theme', nowLight ? 'light' : 'dark');
                    };
                    
                    // Masukkan tombol ke paling kiri pada deretan menu kanan
                    navRight.insertBefore(btn, navRight.firstChild);
                    lucide.createIcons({nodes: [btn]});
                }
            };

            // Animasi Halus untuk UI.modal
            const originalModal = UI.modal;
            UI.modal = function(content, opts) {
                originalModal.apply(this, arguments);
                setTimeout(() => {
                    document.getElementById('modal-body').classList.remove('scale-95', 'opacity-0');
                    document.getElementById('modal-body').classList.add('scale-100', 'opacity-100');
                }, 10);
            };

            const originalCloseModal = UI.closeModal;
            UI.closeModal = function() {
                document.getElementById('modal-body').classList.remove('scale-100', 'opacity-100');
                document.getElementById('modal-body').classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    originalCloseModal.apply(this, arguments);
                }, 300);
            };

            // Cek preferensi tema sebelumnya
            if (localStorage.getItem('itconnect_theme') === 'light') {
                document.body.classList.add('light-mode');
            }

            // Jalankan aplikasi
            App.init();
        });
    </script>
</body>
</html>
