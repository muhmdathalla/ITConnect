<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect - Marketplace Jasa IT Mahasiswa</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ======================================================================
           SECTION: GLOBAL RESET ENGINE
           ======================================================================
        */
        * { 
            box-sizing: border-box !important; 
            -webkit-tap-highlight-color: transparent !important; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            background-color: #000000 !important; 
            color: #ffffff !important; 
            font-family: 'Plus Jakarta Sans', sans-serif !important; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* ======================================================================
           SECTION: NAVBAR COMPONENT (TRADITIONAL ENTERPRISE LAYOUT)
           ======================================================================
        */
        nav#navbar { 
            z-index: 99999 !important; 
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important; 
            width: 100% !important; 
            background: rgba(0,0,0,0.85) !important; 
            backdrop-filter: blur(40px) !important; 
            border-bottom: 1px solid #1a1a1a !important; 
            height: 72px !important; 
            display: flex !important; 
            align-items: center !important; 
        }

        .nav-container { 
            max-width: 1200px !important; 
            margin: 0 auto !important; 
            padding: 0 24px !important; 
            width: 100% !important; 
            display: flex !important; 
            align-items: center !important; 
            justify-content: space-between !important; 
        }

        .nav-left { 
            display: flex !important; 
            align-items: center !important; 
            gap: 32px !important; 
        }

        .nav-right { 
            display: flex !important; 
            align-items: center !important; 
            gap: 16px !important; 
        }

        .nav-logo { 
            font-weight: 900 !important; 
            font-size: 1.4rem !important; 
            color: #ffffff !important; 
            text-decoration: none !important; 
        }

        .nav-link { 
            color: #a0a0a0 !important; 
            font-weight: 500 !important; 
            transition: all 0.2s ease-in-out !important; 
            text-decoration: none !important; 
        }

        .nav-link:hover { 
            color: #ffffff !important; 
        }

        /* ======================================================================
           SECTION: DROPDOWN & INTERACTION SYSTEM
           ======================================================================
        */
        .relative.group { 
            position: relative !important; 
        }

        .dropdown-menu {
            z-index: 999999 !important; 
            position: absolute !important; 
            top: 100% !important; 
            right: 0 !important;
            margin-top: 15px !important; 
            background: #050505 !important; 
            border: 1px solid #222 !important;
            border-radius: 16px !important; 
            padding: 8px !important; 
            width: 240px !important; 
            box-shadow: 0 20px 40px rgba(0,0,0,1) !important; 
            display: none !important;
        }

        .dropdown-menu.active { 
            display: block !important; 
        }

        .dropdown-item {
            display: flex !important; 
            align-items: center !important; 
            gap: 12px !important; 
            padding: 12px 16px !important;
            color: #ffffff !important; 
            background: transparent !important; 
            border-radius: 12px !important;
            width: calc(100% - 12px) !important; 
            margin: 4px 6px !important; 
            transition: 0.2s !important; 
            cursor: pointer !important;
        }

        .dropdown-item:hover { 
            background: #1a1a1a !important; 
        }

        /* ======================================================================
           SECTION: CARD UI (LIQUID GLASS 26.5)
           ======================================================================
        */
        .glass-card {
            background: #0a0a0a !important; 
            border: 1px solid #1a1a1a !important; 
            border-radius: 20px !important;
            padding: 24px !important; 
            transition: transform 0.3s ease !important;
        }

        /* (Lanjutkan expansion style untuk setiap komponen UI lu di sini...) */
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="#/" class="nav-logo">ITConnect</a>
                <div class="hidden md:flex gap-6">
                    <a href="#/" class="nav-link">Dashboard</a>
                    <a href="#/browse" class="nav-link">Proyek</a>
                    <a href="#/messages" class="nav-link">Pesan</a>
                    <a href="#/settings" class="nav-link">Pengaturan</a>
                </div>
            </div>
            <div class="nav-right" id="nav-right-content">
                </div>
        </div>
    </nav>
    <main id="app-root" style="padding-top: 120px; padding-bottom: 50px; max-width: 1200px; margin: 0 auto;"></main>

    <footer>
        <p>&copy; 2026 ITConnect. All rights reserved.</p>
    </footer>

    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            App.init(); 
            
            /* DROPDOWN CLICK HANDLER */
            document.addEventListener('click', (e) => {
                const btn = document.getElementById('profile-btn');
                const menu = document.getElementById('profile-dropdown');
                if(btn && btn.contains(e.target)) menu.classList.toggle('active');
                else if(menu && !menu.contains(e.target)) menu.classList.remove('active');
            });

            setInterval(() => lucide.createIcons(), 1000);
        });
    </script>
</body>
</html>
