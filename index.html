<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect — Marketplace Jasa IT Mahasiswa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =====================================================================
           ITCONNECT — LIQUID GLASS iOS 26.5 CORE DESIGN ENGINE (FULL DIRECTIVE)
           ===================================================================== */
        :root {
            --bg-void:          #000000;
            --bg-base:          #050508;
            --glass-sheet:      rgba(2, 2, 5, 0.65);
            --glass-sm:         rgba(255, 255, 255, 0.035);
            --glass-md:         rgba(255, 255, 255, 0.065);
            --glass-lg:         rgba(255, 255, 255, 0.11);
            --glass-border:     rgba(255, 255, 255, 0.08);
            --glass-border-md:  rgba(255, 255, 255, 0.14);
            --glass-glow:       rgba(0, 212, 255, 0.15);
            
            /* Color System */
            --cyan:             #00d4ff;
            --cyan-dim:         rgba(0, 212, 255, 0.08);
            --violet:           #8b5cf6;
            --violet-dim:       rgba(139, 92, 246, 0.08);
            --amber:            #fbbf24;
            --emerald:          #10b981;
            --red:              #f87171;
            
            /* Typography Slate */
            --text-1:           #f5f5f7;
            --text-2:           #a1a1aa;
            --text-3:           #52525b;
            
            /* Curves & Physics Animation */
            --ease-spring:      cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out:         cubic-bezier(0.4, 0, 0.2, 1);
            --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 26px; --r-pill: 999px;
        }

        /* ─── STABLE RESET & BASE SCROLLBAR ───────────────────────────────── */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-void);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-md);
            border-radius: var(--r-pill);
            border: 2px solid var(--bg-void);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--glass-lg);
        }

        body {
            background-color: var(--bg-void);
            background-image:
                radial-gradient(ellipse 70% 40% at 50% -10%, rgba(0, 212, 255, 0.09) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 30%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 15% 70%, rgba(0, 212, 255, 0.02) 0%, transparent 45%);
            color: var(--text-1);
            font-family: 'Sora', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ─── LIQUID GLASS COCKPIT BARNAV ─────────────────────────────────── */
        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 72px;
            z-index: 9999;
            background: var(--glass-sheet);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
        }

        .nav-container {
            max-width: 1340px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* LOGO & BRAND TEXT CO-PLANAR ROW (SAMPINGAN ABSOLUT) */
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            flex-shrink: 0;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            background: linear-gradient(135deg, #00d4ff 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: #010103;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            position: relative;
        }
        
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.35rem;
            color: var(--text-1);
            letter-spacing: -0.03em;
            display: inline-flex;
            align-items: center;
            line-height: 1;
        }
        
        .logo-text span {
            background: linear-gradient(90deg, #00d4ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-left: 1px;
        }

        /* Nav Center Tab Dock */
        .nav-dock {
            display: flex;
            align-items: center;
            gap: 2px;
            background: var(--glass-sm);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-pill);
            padding: 4px;
        }
        
        .nav-dock-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--r-pill);
            color: var(--text-2);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 180ms var(--ease-out);
            border: 1px solid transparent;
        }
        
        .nav-dock-link:hover {
            color: var(--text-1);
            background: var(--glass-md);
        }
        
        .nav-dock-link.active {
            color: var(--cyan);
            background: var(--cyan-dim);
            border-color: rgba(0, 212, 255, 0.15);
            font-weight: 600;
        }

        /* Buttons Premium Layout */
        .btn-nav-ghost {
            padding: 8px 16px;
            border-radius: var(--r-md);
            border: 1px solid var(--glass-border);
            color: var(--text-2);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 150ms var(--ease-out);
            background: transparent;
        }
        .btn-nav-ghost:hover {
            background: var(--glass-sm);
            color: var(--text-1);
            border-color: var(--glass-border-md);
        }
        
        .btn-nav-primary {
            padding: 8px 18px;
            border-radius: var(--r-md);
            background: linear-gradient(135deg, #00d4ff, #0ea5e9);
            color: #000000;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(0, 212, 255, 0.25);
            transition: all 200ms var(--ease-spring);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-nav-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(0, 212, 255, 0.45);
        }

        .icon-btn {
            position: relative;
            width: 38px;
            height: 38px;
            border-radius: var(--r-md);
            background: var(--glass-sm);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            text-decoration: none;
            transition: all 150ms var(--ease-out);
        }
        .icon-btn:hover {
            background: var(--glass-md);
            color: var(--text-1);
            border-color: var(--glass-border-md);
        }
        
        .notif-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 16px;
            height: 16px;
            padding: 0 4px;
            background: var(--red);
            border-radius: var(--r-pill);
            font-size: 0.65rem;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--bg-void);
        }

        /* ─── PROFILE PILL CHEVRON SPECIFIC ACTION ───────────────────────── */
        .profile-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 6px;
            border-radius: var(--r-pill);
            background: var(--glass-sm);
            border: 1px solid var(--glass-border);
            position: relative;
        }
        
        .p-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #000000;
        }
        
        .p-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-1);
            max-width: 95px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            user-select: none;
        }
        
        /* Panah Pemegang Akses Klik Dropdown */
        .p-chevron {
            width: 20px;
            height: 20px;
            color: var(--text-2);
            cursor: pointer;
            transition: transform 250ms var(--ease-spring), color 120ms, background 120ms;
            padding: 2px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .p-chevron:hover {
            color: var(--cyan);
            background: rgba(255, 255, 255, 0.08);
        }
        .profile-pill.open .p-chevron {
            transform: rotate(180deg);
            color: var(--cyan);
            background: rgba(0, 212, 255, 0.1);
        }

        /* ─── DROPDOWN GLASS CONTAINER MODULE ────────────────────────────── */
        #profile-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 255px;
            background: rgba(6, 6, 11, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border-md);
            border-radius: var(--r-lg);
            padding: 8px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.85), inset 0 1px 0 rgba(255,255,255,0.1);
            display: none;
            z-index: 100000;
        }
        #profile-dropdown.active {
            display: block;
            animation: dropdown-anamorphic 0.22s var(--ease-spring) both;
        }
        @keyframes dropdown-anamorphic {
            from { opacity: 0; transform: scale(0.95) translateY(-6px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .dd-header {
            padding: 12px 10px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 6px;
        }
        .dd-name { font-size: 0.9rem; font-weight: 700; color: var(--text-1); line-height: 1.2; }
        .dd-email { font-size: 0.78rem; color: var(--text-2); margin-top: 3px; font-weight: 400; }
        
        .dd-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: var(--r-pill);
            font-size: 0.72rem;
            font-weight: 600;
            border: 1px solid transparent;
        }
        .dd-badge-mahasiswa { background: var(--cyan-dim); color: var(--cyan); border-color: rgba(0, 212, 255, 0.15); }
        .dd-badge-klien { background: var(--violet-dim); color: var(--violet); border-color: rgba(139, 92, 246, 0.15); }

        .dd-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 12px;
            border-radius: var(--r-md);
            color: var(--text-2);
            font-size: 0.88rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 120ms var(--ease-out);
        }
        .dd-item:hover {
            background: var(--glass-sm);
            color: var(--text-1);
        }
        .dd-icon {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .dd-icon-cyan { background: var(--cyan-dim); color: var(--cyan); }
        .dd-icon-violet { background: var(--violet-dim); color: var(--violet); }
        .dd-icon-amber { background: rgba(251, 191, 36, 0.08); color: var(--amber); }
        .dd-item-danger { color: var(--red); }
        .dd-item-danger:hover { background: rgba(248, 113, 113, 0.08); color: var(--red); }

        /* ─── DYNAMIC INJECTED COMPONENT STYLES ──────────────────────────── */
        .fade-in {
            animation: view-canvas-fade 0.4s var(--ease-out) both;
        }
        @keyframes view-canvas-fade {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .stat-card {
            background: var(--glass-sm);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-lg);
            padding: 20px;
            text-align: center;
            transition: all 250ms var(--ease-out);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            pointer-events: none;
        }
        .stat-card:hover {
            background: var(--glass-md);
            border-color: var(--glass-border-md);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .project-card {
            background: var(--glass-sm);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            padding: 24px;
            transition: all 260ms var(--ease-out);
            position: relative;
        }
        .project-card:hover {
            background: var(--glass-md);
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.5);
            transform: translateY(-3px);
        }

        /* Empty State Blueprint */
        .empty-state-wrapper {
            padding: 48px 24px;
            text-align: center;
            background: var(--glass-sm);
            border: 1px dashed var(--glass-border-md);
            border-radius: var(--r-xl);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ─── VIEWPORT ROUTER MATRIX CANVAS ───────────────────────────────── */
        #app-root {
            position: relative;
            z-index: 10;
            padding-top: 108px;
            padding-bottom: 80px;
            max-width: 1340px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .hero-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at 50% 25%, black 45%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at 50% 25%, black 45%, transparent 90%);
        }

        /* ─── SYSTEM MASTER FOOTER ────────────────────────────────────────── */
        footer {
            position: relative;
            z-index: 20;
            border-top: 1px solid var(--glass-border);
            padding: 32px 24px;
            background: rgba(2, 2, 4, 0.85);
            backdrop-filter: blur(15px);
        }
        footer a {
            color: var(--text-3);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: color 120ms ease;
        }
        footer a:hover {
            color: var(--text-2);
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-container" id="navbar-inner">
            </div>
    </nav>

    <div class="hero-grid"></div>
    
    <main id="app-root">
        </main>

    <footer>
        <div style="max-width:1340px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px;">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="logo-icon" style="width:26px; height:26px; font-size:0.68rem; border-radius:6px; box-shadow:none;">IT</div>
                <span style="font-weight:700; color:var(--text-2); font-size:0.92rem; letter-spacing:-0.01em;">ITConnect <span style="font-weight:400; color:var(--text-3);">Enterprise</span></span>
            </div>
            <span style="color:var(--text-3); font-size:0.78rem; font-weight:400;">&copy; 2026 ITConnect Corp. Engineered to High-Fidelity Professional Standards.</span>
            <div style="display:flex; gap:24px;">
                <a href="#/about">Tentang</a>
                <a href="#/privacy">Kebijakan Privasi</a>
                <a href="#/terms">Syarat Ketentuan</a>
            </div>
        </div>
    </footer>

    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        /* 1. INITIALIZE FRAMEWORK BACKBONE ROUTER */
        if (typeof App !== 'undefined') {
            App.init();
        }

        /* 2. SPECIFIC CHEVRON ARROW CLICK EVENT INTERCEPTOR (ANTI-COLLISION) */
        document.addEventListener('click', (e) => {
            const pillBtn = document.getElementById('profile-pill-btn');
            const dropdown = document.getElementById('profile-dropdown');
            if (!pillBtn || !dropdown) return;

            // Memeriksa klik spesifik pada elemen panah/chevron (.p-chevron) bawaan ui.js
            const isChevronTarget = e.target.closest('.p-chevron');

            if (isChevronTarget) {
                // Hentikan propagasi agar klik tidak langsung menutup dirinya sendiri melalui listener luar
                e.stopPropagation();
                const isNowOpen = dropdown.classList.toggle('active');
                pillBtn.classList.toggle('open', isNowOpen);
                pillBtn.setAttribute('aria-expanded', String(isNowOpen));
            } else if (!dropdown.contains(e.target)) {
                // Menutup dropdown jika klik terjadi di luar kotak menu dropdown
                dropdown.classList.remove('active');
                pillBtn.classList.remove('open');
                pillBtn.setAttribute('aria-expanded', 'false');
            }
        });

        /* 3. PHYSICAL KEYBOARD CONTROL (ACCESSIBILITY CLOSURE) */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('profile-dropdown')?.classList.remove('active');
                document.getElementById('profile-pill-btn')?.classList.remove('open');
                document.getElementById('profile-pill-btn')?.setAttribute('aria-expanded', 'false');
            }
        });

        /* 4. RE-SYNCHRONIZATION ACTIVE STATE LINKS ON ROUTE CHANGE */
        function syncActiveNavigation() {
            const currentHash = window.location.hash || '#/';
            document.querySelectorAll('.nav-dock-link').forEach(link => {
                link.classList.toggle('active', link.getAttribute('href') === currentHash);
            });
        }
        window.addEventListener('hashchange', syncActiveNavigation);
        syncActiveNavigation();

        /* 5. LUCIDE ICONS PARSER SCHEDULER (REAL-TIME ENGINE) */
        setInterval(() => { 
            if (window.lucide && typeof lucide.createIcons === 'function') {
                lucide.createIcons(); 
            } 
        }, 700);
    });
    </script>
</body>
</html>
