<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect - Marketplace Jasa IT Mahasiswa</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>
    
    <!-- CUSTOM LIQUID GLASS & THEME CSS -->
    <style type="text/tailwindcss">
        @layer utilities {
          .gradient-text { @apply text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500; }
        }

        @layer components {
          /* Navigation */
          .nav-container { @apply max-w-6xl mx-auto px-4 h-16 flex items-center justify-between w-full; }
          .nav-logo { @apply flex items-center gap-2 font-bold text-lg text-white tracking-tight transition-all; }
          .nav-link { @apply px-3 py-2 text-sm font-medium text-slate-400 transition-all rounded-xl; }
          
          /* Form Elements */
          .form-group { @apply flex flex-col gap-2; }
          .form-label { @apply text-xs font-bold uppercase tracking-wider text-slate-400; }
          .input-icon-wrapper { @apply relative flex items-center; }
          .input-icon { @apply absolute left-4 w-5 h-5 text-slate-500 transition-all; }
          
          /* Badges & Tags */
          .skill-tag { @apply px-3 py-1 bg-white/5 border border-white/10 rounded-xl text-xs text-slate-300 backdrop-blur-md transition-all; }
          .notif-badge { @apply absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white shadow-lg shadow-red-500/50; }
        }

        /* =========================================
           LIQUID GLASSMORPHISM (iOS 26.5 VIBES)
           ========================================= */
        
        /* Z-INDEX FIX UNTUK OVERLAP NAVBAR & DROPDOWN */
        nav#navbar { z-index: 99999 !important; }
        .dropdown-menu { z-index: 100000 !important; }

        /* Dark Mode (Default) Liquid Glass */
        .glass-card, .glass-nav, .dropdown-menu {
          background: rgba(15, 23, 42, 0.35) !important;
          backdrop-filter: blur(32px) saturate(200%) !important;
          -webkit-backdrop-filter: blur(32px) saturate(200%) !important;
          border-top: 1px solid rgba(255, 255, 255, 0.15) !important;
          border-left: 1px solid rgba(255, 255, 255, 0.1) !important;
          border-right: 1px solid rgba(255, 255, 255, 0.05) !important;
          border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
          box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5) !important;
          transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
        }

        .glass-card:hover {
          background: rgba(30, 41, 59, 0.45) !important;
          border-top: 1px solid rgba(6, 182, 212, 0.4) !important;
          border-left: 1px solid rgba(6, 182, 212, 0.2) !important;
          transform: translateY(-4px) scale(1.005);
          box-shadow: 0 20px 40px -10px rgba(6, 182, 212, 0.15) !important;
        }

        .dropdown-item {
          @apply flex items-center gap-3 px-4 py-3 text-sm transition-all w-full text-left cursor-pointer;
          color: #cbd5e1 !important;
          border-radius: 12px;
          margin: 2px 4px;
          width: calc(100% - 8px) !important;
        }
        .dropdown-item:hover {
          background: rgba(255, 255, 255, 0.1) !important;
          color: white !important;
          transform: translateX(4px);
        }

        /* Inputs */
        .form-input {
          @apply w-full rounded-2xl px-4 py-3.5 text-sm transition-all;
          background: rgba(0, 0, 0, 0.2) !important;
          backdrop-filter: blur(16px);
          border: 1px solid rgba(255, 255, 255, 0.1) !important;
          color: white !important;
        }
        .form-input:focus {
          background: rgba(0, 0, 0, 0.4) !important;
          border-color: #06b6d4 !important;
          box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15) !important;
          outline: none;
        }

        /* Buttons */
        .btn-primary {
          @apply text-white shadow-xl flex items-center justify-center transition-all overflow-hidden relative;
          background: linear-gradient(135deg, rgba(6, 182, 212, 0.8), rgba(37, 99, 235, 0.8)) !important;
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-primary:hover {
          background: linear-gradient(135deg, rgba(6, 182, 212, 1), rgba(37, 99, 235, 1)) !important;
          transform: translateY(-2px);
          box-shadow: 0 10px 20px -5px rgba(6, 182, 212, 0.4) !important;
        }

        /* Background Animated Grid */
        .hero-grid {
          position: fixed; inset: 0; z-index: -1;
          background-image: 
            linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
          background-size: 50px 50px;
          animation: gridPan 30s linear infinite;
        }
        @keyframes gridPan {
          from { transform: translateY(0); }
          to { transform: translateY(50px); }
        }

        /* =========================================
           LIGHT MODE (DYNAMIC OVERRIDES)
           ========================================= */
        body.light-mode {
          background-color: #f8fafc !important; /* Sangat terang & clean */
          color: #0f172a !important;
        }
        body.light-mode .hero-grid {
          background-image: 
            linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
        }
        
        /* Light Mode Glass */
        body.light-mode .glass-card, 
        body.light-mode .glass-nav, 
        body.light-mode .dropdown-menu {
          background: rgba(255, 255, 255, 0.6) !important;
          backdrop-filter: blur(40px) saturate(250%) !important;
          -webkit-backdrop-filter: blur(40px) saturate(250%) !important;
          border-top: 1px solid rgba(255, 255, 255, 1) !important;
          border-left: 1px solid rgba(255, 255, 255, 0.8) !important;
          border-right: 1px solid rgba(255, 255, 255, 0.4) !important;
          border-bottom: 1px solid rgba(255, 255, 255, 0.4) !important;
          box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.08) !important;
        }

        body.light-mode .glass-card:hover {
          background: rgba(255, 255, 255, 0.85) !important;
          border-top: 1px solid rgba(6, 182, 212, 0.6) !important;
          border-left: 1px solid rgba(6, 182, 212, 0.4) !important;
          box-shadow: 0 20px 40px -10px rgba(6, 182, 212, 0.15) !important;
        }

        /* Text Fixes for Light Mode */
        body.light-mode .text-white { color: #0f172a !important; }
        body.light-mode .text-slate-200 { color: #1e293b !important; }
        body.light-mode .text-slate-300 { color: #334155 !important; }
        body.light-mode .text-slate-400 { color: #64748b !important; }
        body.light-mode .text-slate-500 { color: #94a3b8 !important; }

        /* Force transparent for specific Tailwind dark classes in Light Mode */
        body.light-mode .bg-navy-950, 
        body.light-mode .bg-navy-900, 
        body.light-mode .bg-white\/5 {
            background-color: transparent !important;
        }
        body.light-mode .border-white\/10 {
            border-color: rgba(0,0,0,0.06) !important;
        }

        /* Light Mode Dropdown */
        body.light-mode .dropdown-item {
          color: #334155 !important;
        }
        body.light-mode .dropdown-item:hover {
          background: rgba(0, 0, 0, 0.04) !important;
          color: #0f172a !important;
        }

        /* Light Mode Inputs */
        body.light-mode .form-input {
          background: rgba(255, 255, 255, 0.7) !important;
          border: 1px solid rgba(0, 0, 0, 0.1) !important;
          color: #0f172a !important;
          box-shadow: inset 0 2px 4px rgba(0,0,0,0.02) !important;
        }
        body.light-mode .form-input:focus {
          background: #ffffff !important;
          border-color: #06b6d4 !important;
          box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.2), inset 0 2px 4px rgba(0,0,0,0.02) !important;
        }

        /* General Animations */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeIn { 
          from { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(4px); } 
          to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
        }
    </style>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-navy-950 text-slate-200 min-h-screen flex flex-col font-sans antialiased selection:bg-cyan-500/30 selection:text-cyan-200 transition-colors duration-700">

    <div class="hero-grid"></div>

    <!-- Navigation Bar -->
    <nav id="navbar" class="fixed top-0 w-full glass-nav transition-all duration-500"></nav>

    <!-- Main Application Root -->
    <main id="app-root" class="flex-grow pt-20 pb-10"></main>

    <!-- Global Components -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-3"></div>
    
    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-navy-950/40 backdrop-blur-md z-[70] hidden items-center justify-center p-4 transition-all duration-300">
        <div id="modal-body" class="w-full max-w-lg transform scale-95 opacity-0 transition-all duration-300"></div>
    </div>

    <!-- Application Scripts -->
    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
    
    <!-- Initialize App & Inject Theme Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Modifikasi halus UI.renderNav untuk menyuntikkan tombol Theme
            const originalRenderNav = UI.renderNav;
            UI.renderNav = function() {
                originalRenderNav.apply(this, arguments);
                
                // Cari container sisi kanan di dalam navbar
                const navRight = document.querySelector('.nav-container .flex.items-center.gap-2') || 
                                 document.querySelector('.nav-container .flex.items-center.gap-3');
                
                if (navRight && !document.getElementById('theme-toggle-btn')) {
                    const btn = document.createElement('button');
                    btn.id = 'theme-toggle-btn';
                    btn.className = 'w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/20 border border-white/10 transition-all backdrop-blur-md ml-1 sm:ml-2';
                    
                    const isLight = document.body.classList.contains('light-mode');
                    btn.innerHTML = isLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400"></i>';
                    
                    // Logika pergantian tema
                    btn.onclick = () => {
                        document.body.classList.toggle('light-mode');
                        const nowLight = document.body.classList.contains('light-mode');
                        
                        // Efek pergantian Icon
                        btn.innerHTML = nowLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500 drop-shadow-md"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400 drop-shadow-md"></i>';
                        btn.style.borderColor = nowLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
                        btn.style.background = nowLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
                        
                        lucide.createIcons({nodes: [btn]});
                        
                        // Simpan preferensi di LocalStorage (Opsional)
                        localStorage.setItem('itconnect_theme', nowLight ? 'light' : 'dark');
                    };
                    
                    // Masukkan tombol ke paling kiri pada deretan menu kanan
                    navRight.insertBefore(btn, navRight.firstChild);
                    lucide.createIcons({nodes: [btn]});
                }
            };

            // Animasi Halus untuk UI.modal
            const originalModal = UI.modal;
            UI.modal = function(content, opts) {
                originalModal.apply(this, arguments);
                setTimeout(() => {
                    document.getElementById('modal-body').classList.remove('scale-95', 'opacity-0');
                    document.getElementById('modal-body').classList.add('scale-100', 'opacity-100');
                }, 10);
            };

            const originalCloseModal = UI.closeModal;
            UI.closeModal = function() {
                document.getElementById('modal-body').classList.remove('scale-100', 'opacity-100');
                document.getElementById('modal-body').classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    originalCloseModal.apply(this, arguments);
                }, 300);
            };

            // Cek preferensi tema sebelumnya
            if (localStorage.getItem('itconnect_theme') === 'light') {
                document.body.classList.add('light-mode');
            }

            // Jalankan aplikasi
            App.init();
        });
    </script>
</body>
</html>
