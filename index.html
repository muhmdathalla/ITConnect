<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect - Marketplace Jasa IT Mahasiswa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* [1] GLOBAL SETTINGS & PURE BLACK THEME */
        *, *::before, *::after { box-sizing: border-box !important; }
        body { background-color: #000000 !important; color: #ffffff !important; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .gradient-text { background: none !important; -webkit-text-fill-color: #ffffff !important; color: #ffffff !important; }

        /* [2] NAVBAR LOCK */
        nav#navbar { z-index: 99999 !important; position: fixed !important; top: 0 !important; width: 100% !important; background: rgba(0,0,0,0.85) !important; backdrop-filter: blur(40px) !important; border-bottom: 1px solid #1a1a1a !important; }
        .nav-container { max-width: 72rem !important; margin: 0 auto !important; padding: 0 1.5rem !important; height: 4.5rem !important; display: flex !important; align-items: center !important; justify-content: space-between !important; }
        .nav-logo { font-weight: 800 !important; font-size: 1.25rem !important; color: #ffffff !important; text-decoration: none !important; display: flex !important; align-items: center !important; gap: 8px !important; }
        .nav-link { color: #ffffff !important; font-weight: 500 !important; }
        .nav-link:hover { opacity: 0.7 !important; }

        /* [3] SOLID BLACK DROPDOWN (ANTI-TEMBUS) */
        .relative.group { position: relative !important; padding-bottom: 20px !important; }
        .dropdown-menu {
            z-index: 999999 !important; position: absolute !important; top: 100% !important; right: 0 !important;
            margin-top: 5px !important; background: #050505 !important; border: 1px solid #333 !important;
            border-radius: 16px !important; box-shadow: 0 20px 50px rgba(0,0,0,1) !important;
            padding: 0.5rem !important; min-width: 220px !important; display: none !important;
        }
        .group:hover .dropdown-menu { display: block !important; }
        .dropdown-item {
            display: flex !important; align-items: center !important; gap: 12px !important; padding: 12px 16px !important;
            color: #ffffff !important; background: transparent !important; border-radius: 12px !important;
            width: calc(100% - 12px) !important; margin: 4px 6px !important; transition: 0.2s !important;
        }
        .dropdown-item:hover { background: #1a1a1a !important; }

        /* [4] LIQUID GLASS CARDS */
        .glass-card, .project-card, .stat-card, .category-card {
            background: rgba(18, 18, 18, 0.6) !important; backdrop-filter: blur(32px) !important;
            border: 1px solid #1a1a1a !important; border-radius: 24px !important; padding: 1.5rem !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6) !important; transition: transform 0.3s ease !important;
        }
        .glass-card:hover, .project-card:hover, .stat-card:hover { border-color: #333 !important; transform: translateY(-3px) !important; }

        /* [5] CATEGORY CARD FIX */
        .category-card { display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; text-align: center !important; }
        .category-card .w-12.h-12 { display: flex !important; align-items: center !important; justify-content: center !important; width: 3.5rem !important; height: 3.5rem !important; border-radius: 50% !important; background: #1a1a1a !important; margin-bottom: 12px !important; }
        .category-card svg { width: 1.5rem !important; height: 1.5rem !important; color: #fff !important; }

        /* [6] FORMS & SEARCHBAR FIX */
        .input-icon-wrapper { position: relative !important; width: 100% !important; }
        .input-icon { position: absolute !important; left: 14px !important; top: 50% !important; transform: translateY(-50%) !important; color: #555 !important; z-index: 10 !important; }
        .form-input { 
            width: 100% !important; background: #0a0a0a !important; border: 1px solid #222 !important; color: #fff !important; 
            padding: 12px 16px !important; padding-left: 45px !important; border-radius: 14px !important; 
        }
        .form-input:focus { border-color: #555 !important; outline: none !important; }

        /* [7] BUTTONS */
        .btn-primary { background: #fff !important; color: #000 !important; padding: 12px 24px !important; border-radius: 14px !important; font-weight: 700 !important; display: inline-flex; align-items: center; justify-content: center; }
        .btn-secondary { background: #111 !important; color: #fff !important; padding: 12px 24px !important; border-radius: 14px !important; border: 1px solid #222 !important; display: inline-flex; align-items: center; justify-content: center; }
        
        .hero-grid { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <nav id="navbar" class="glass-nav"></nav>
    <main id="app-root" style="padding-top: 100px; padding-bottom: 50px;"></main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[60]"></div>
    <div id="modal-overlay" class="fixed inset-0 bg-black/80 z-[70] hidden items-center justify-center">
        <div id="modal-body" class="bg-[#050505] border border-[#222] p-6 rounded-2xl w-full max-w-lg"></div>
    </div>

    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => { App.init(); });
    </script>
</body>
</html>
