<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect - Marketplace Jasa IT Mahasiswa</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>
    
    <!-- CUSTOM LIQUID GLASS & THEME CSS -->
 <style>
        /* =========================================
           CORE LAYOUT & NAVBAR STRUCTURE FIXED
           ========================================= */
        nav#navbar { 
            z-index: 99999 !important; 
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            display: block !important;
        }
        
        .nav-container { 
            max-width: 72rem !important; 
            margin-left: auto !important; 
            margin-right: auto !important; 
            padding-left: 1rem !important; 
            padding-right: 1rem !important; 
            height: 4rem !important; 
            display: flex !important; 
            align-items: center !important; 
            justify-content: space-between !important; 
            width: 100% !important;
            box-sizing: border-box !important;
        }

        .nav-logo { 
            display: flex !important; 
            align-items: center !important; 
            gap: 0.5rem !important; 
            font-weight: 800 !important; 
            font-size: 1.125rem !important; 
            letter-spacing: -0.025em !important;
            text-decoration: none !important;
        }

        .gradient-text, .text-cyan-400 {
            background: none !important;
            -webkit-text-fill-color: currentcolor !important;
            color: inherit !important;
        }

        .dropdown-menu { 
            z-index: 100000 !important; 
            box-sizing: border-box !important;
        }

        /* =========================================
           FIX TOTAL CATEGORY CARD & LOGO CENTERED (iOS Standard)
           ========================================= */
        .category-card {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important;
            gap: 1.25rem !important; /* Jarak pas antara ikon dan teks */
            padding: 1.25rem !important;
            width: 100% !important;
            box-sizing: border-box !important;
            border-radius: 20px !important; /* Radius membulat halus khas iOS */
        }

        /* Memaksa lingkaran pembungkus ikon agar bulat sempurna dan di tengah */
        .category-card .w-12.h-12, 
        .category-card [class*="rounded-xl"],
        .category-card [class*="rounded-lg"] {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            flex-shrink: 0 !important; /* Mencegah ikon menciut atau gepeng */
            width: 3rem !important;
            height: 3rem !important;
            border-radius: 14px !important;
        }

        /* Memaksa logo/ikon di dalam lingkaran tepat berada di tengah */
        .category-card svg, 
        .category-card i {
            margin: auto !important;
            display: block !important;
            flex-shrink: 0 !important;
        }

        /* =========================================
           TAMPILAN 1: PURE DARK (HITAM TOTAL)
           ========================================= */
        body {
            background-color: #000000 !important; /* Hitam Total */
            color: #ffffff !important; /* Font Putih Bersih */
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .nav-logo, .nav-link { color: #ffffff !important; }

        /* Navigasi Kaca Hitam Maksimal */
        .glass-nav {
            background: rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(40px) saturate(150%) !important;
            -webkit-backdrop-filter: blur(40px) saturate(150%) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15) !important;
        }

        /* Komponen Kaca Hitam Maksimal iOS 26.5 */
        .glass-card, .dropdown-menu, .category-card {
            background: rgba(12, 12, 12, 0.55) !important;
            backdrop-filter: blur(35px) !important;
            -webkit-backdrop-filter: blur(35px) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.22) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.14) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.04) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04) !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.85) !important;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        /* Lingkaran Ikon Tema Hitam */
        .category-card .w-12.h-12 {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
        }
        .category-card svg, .category-card i { color: #ffffff !important; }

        /* Hover Kaca Melayang Monokrom */
        .project-card:hover, .category-card:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.6) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.4) !important;
            transform: translateY(-5px) !important;
            box-shadow: 0 30px 60px rgba(255, 255, 255, 0.05) !important;
        }

        /* Tombol Utama (Putih Bersih di Tema Hitam) */
        .btn-primary {
            background: #ffffff !important;
            color: #000000 !important;
            border: 1px solid #ffffff !important;
            font-weight: 700 !important;
            border-radius: 14px !important;
            transition: all 0.3s ease !important;
        }
        .btn-primary:hover {
            background: transparent !important;
            color: #ffffff !important;
        }

        /* Tombol Sekunder */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 14px !important;
        }

        /* Item Dropdown */
        .dropdown-item {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 12px 16px !important;
            color: #e2e8f0 !important;
            transition: all 0.3s ease !important;
            width: calc(100% - 12px) !important;
            margin: 4px 6px !important;
            border-radius: 12px !important;
            background: transparent !important;
        }
        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
        }

        /* Kolom Input Form */
        .form-input {
            width: 100% !important;
            border-radius: 14px !important;
            padding: 12px 16px !important;
            background: rgba(255, 255, 255, 0.04) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
        }

        /* =========================================
           TAMPILAN 2: PURE LIGHT (PUTIH TOTAL)
           ========================================= */
        body.light-mode {
            background-color: #ffffff !important; /* Putih Total */
            color: #000000 !important; /* Font Hitam Pekat */
        }

        body.light-mode .nav-logo, body.light-mode .nav-link { color: #000000 !important; }

        /* Navigasi Kaca Putih */
        body.light-mode .glass-nav {
            background: rgba(255, 255, 255, 0.65) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.15) !important;
        }

        /* Komponen Kaca Putih */
        body.light-mode .glass-card, body.light-mode .dropdown-menu, body.light-mode .category-card {
            background: rgba(255, 255, 255, 0.55) !important;
            border-top: 1px solid rgba(255, 255, 255, 1) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.8) !important;
            border-right: 1px solid rgba(0, 0, 0, 0.08) !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05) !important;
        }

        /* Lingkaran Ikon Tema Putih */
        body.light-mode .category-card .w-12.h-12 {
            background: rgba(0, 0, 0, 0.04) !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
        }
        body.light-mode .category-card svg, body.light-mode .category-card i { color: #000000 !important; }

        body.light-mode .glass-card:hover, body.light-mode .category-card:hover {
            background: rgba(255, 255, 255, 0.9) !important;
            border-top: 1px solid rgba(0, 0, 0, 0.4) !important;
            border-left: 1px solid rgba(0, 0, 0, 0.3) !important;
        }

        /* Tombol Utama (Hitam di Tema Putih) */
        body.light-mode .btn-primary {
            background: #000000 !important;
            color: #ffffff !important;
            border: 1px solid #000000 !important;
        }
        body.light-mode .btn-primary:hover {
            background: transparent !important;
            color: #000000 !important;
        }

        /* Tombol Sekunder di Tema Putih */
        body.light-mode .btn-secondary {
            background: rgba(0, 0, 0, 0.05) !important;
            color: #000000 !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
        }

        /* Sinkronisasi Semua Teks & Warna Font di Light Mode */
        body.light-mode .text-white, body.light-mode .text-slate-200, 
        body.light-mode .text-slate-300, body.light-mode .text-slate-400, 
        body.light-mode .text-slate-500 { 
            color: #000000 !important; 
        }

        body.light-mode .dropdown-item { color: #111111 !important; }
        body.light-mode .dropdown-item:hover {
            background: rgba(0, 0, 0, 0.06) !important;
            color: #000000 !important;
        }

        body.light-mode .form-input {
            background: rgba(0, 0, 0, 0.02) !important;
            border: 1px solid rgba(0, 0, 0, 0.15) !important;
            color: #000000 !important;
        }

        /* Bersihkan total sisa warna bawaan */
        body.light-mode .bg-navy-950, body.light-mode .bg-navy-900, body.light-mode .bg-white\/5 {
            background-color: transparent !important;
        }
        body.light-mode .border-white\/10 {
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
        
        /* Hilangkan Wallpaper/Grid bawaan */
        .hero-grid { display: none !important; }

        /* Animasi Masuk Halaman Selembut iOS */
        .fade-in { animation: iosPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes iosPop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-navy-950 text-slate-200 min-h-screen flex flex-col font-sans antialiased selection:bg-cyan-500/30 selection:text-cyan-200 transition-colors duration-700">

    <div class="hero-grid"></div>

    <!-- Navigation Bar -->
    <nav id="navbar" class="fixed top-0 w-full glass-nav transition-all duration-500"></nav>

    <!-- Main Application Root -->
    <main id="app-root" class="flex-grow pt-20 pb-10"></main>

    <!-- Global Components -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-3"></div>
    
    <!-- Modal Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-navy-950/40 backdrop-blur-md z-[70] hidden items-center justify-center p-4 transition-all duration-300">
        <div id="modal-body" class="w-full max-w-lg transform scale-95 opacity-0 transition-all duration-300"></div>
    </div>

    <!-- Application Scripts -->
    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
    
    <!-- Initialize App & Inject Theme Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Modifikasi halus UI.renderNav untuk menyuntikkan tombol Theme
            const originalRenderNav = UI.renderNav;
            UI.renderNav = function() {
                originalRenderNav.apply(this, arguments);
                
                // Cari container sisi kanan di dalam navbar
                const navRight = document.querySelector('.nav-container .flex.items-center.gap-2') || 
                                 document.querySelector('.nav-container .flex.items-center.gap-3');
                
                if (navRight && !document.getElementById('theme-toggle-btn')) {
                    const btn = document.createElement('button');
                    btn.id = 'theme-toggle-btn';
                    btn.className = 'w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/20 border border-white/10 transition-all backdrop-blur-md ml-1 sm:ml-2';
                    
                    const isLight = document.body.classList.contains('light-mode');
                    btn.innerHTML = isLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400"></i>';
                    
                    // Logika pergantian tema
                    btn.onclick = () => {
                        document.body.classList.toggle('light-mode');
                        const nowLight = document.body.classList.contains('light-mode');
                        
                        // Efek pergantian Icon
                        btn.innerHTML = nowLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500 drop-shadow-md"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400 drop-shadow-md"></i>';
                        btn.style.borderColor = nowLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
                        btn.style.background = nowLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
                        
                        lucide.createIcons({nodes: [btn]});
                        
                        // Simpan preferensi di LocalStorage (Opsional)
                        localStorage.setItem('itconnect_theme', nowLight ? 'light' : 'dark');
                    };
                    
                    // Masukkan tombol ke paling kiri pada deretan menu kanan
                    navRight.insertBefore(btn, navRight.firstChild);
                    lucide.createIcons({nodes: [btn]});
                }
            };

            // Animasi Halus untuk UI.modal
            const originalModal = UI.modal;
            UI.modal = function(content, opts) {
                originalModal.apply(this, arguments);
                setTimeout(() => {
                    document.getElementById('modal-body').classList.remove('scale-95', 'opacity-0');
                    document.getElementById('modal-body').classList.add('scale-100', 'opacity-100');
                }, 10);
            };

            const originalCloseModal = UI.closeModal;
            UI.closeModal = function() {
                document.getElementById('modal-body').classList.remove('scale-100', 'opacity-100');
                document.getElementById('modal-body').classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    originalCloseModal.apply(this, arguments);
                }, 300);
            };

            // Cek preferensi tema sebelumnya
            if (localStorage.getItem('itconnect_theme') === 'light') {
                document.body.classList.add('light-mode');
            }

            // Jalankan aplikasi
            App.init();
        });
    </script>
</body>
</html>
