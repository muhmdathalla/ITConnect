<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect - Marketplace Jasa IT Mahasiswa</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --bg-body: #000000;
            --text-body: #ffffff;
            --glass-nav: rgba(0, 0, 0, 0.75);
            --glass-card: rgba(15, 15, 15, 0.6);
            --glass-border-top: rgba(255, 255, 255, 0.22);
            --glass-border-left: rgba(255, 255, 255, 0.12);
            --glass-border-flat: rgba(255, 255, 255, 0.06);
            --input-fill: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.15);
            --shadow-lux: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        body.light-mode {
            --bg-body: #ffffff;
            --text-body: #000000;
            --glass-nav: rgba(255, 255, 255, 0.7);
            --glass-card: rgba(255, 255, 255, 0.55);
            --glass-border-top: rgba(255, 255, 255, 1);
            --glass-border-left: rgba(255, 255, 255, 0.8);
            --glass-border-flat: rgba(0, 0, 0, 0.06);
            --input-fill: rgba(0, 0, 0, 0.02);
            --input-border: rgba(0, 0, 0, 0.14);
            --shadow-lux: 0 20px 40px rgba(0, 0, 0, 0.04);
        }

        *, *::before, *::after { box-sizing: border-box !important; }

        body {
            background-color: var(--bg-body) !important;
            color: var(--text-body) !important;
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Kebiri Total Gradasi Warna Menjadi Monokrom */
        .gradient-text, .text-cyan-400, [class*="text-cyan-"], [class*="text-blue-"], [class*="text-purple-"] {
            background: none !important;
            -webkit-text-fill-color: currentcolor !important;
            color: inherit !important;
        }

        /* Fix Total Pewarnaan Typography DOM Default */
        h1, h2, h3, h4, h5, h6 { color: var(--text-body) !important; }
        .text-white { color: var(--text-body) !important; }

        /* =============================================
           NAVBAR STRUCTURE FIXED (PIXEL PERFECT)
           ============================================= */
        nav#navbar {
            z-index: 99999 !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            display: block !important;
            background: var(--glass-nav) !important;
            backdrop-filter: blur(40px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(40px) saturate(180%) !important;
            border-bottom: 1px solid var(--glass-border-flat) !important;
            box-shadow: var(--shadow-lux) !important;
            transition: background 0.4s ease !important;
        }

        .nav-container {
            max-width: 72rem !important;
            margin: 0 auto !important;
            padding: 0 1.5rem !important;
            height: 4.5rem !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            width: 100% !important;
        }

        .nav-logo {
            display: flex !important;
            align-items: center !important;
            gap: 0.5rem !important;
            font-weight: 900 !important;
            font-size: 1.25rem !important;
            letter-spacing: -0.03em !important;
            text-decoration: none !important;
            color: var(--text-body) !important;
        }

        .nav-link {
            color: var(--text-body) !important;
            opacity: 0.8;
            transition: opacity 0.25s ease !important;
        }
        .nav-link:hover { opacity: 1; }

        /* =============================================
           MAXIMUM LIQUID GLASS CORE STRUCTURE
           ============================================= */
        .glass-card, .project-card, .stat-card, .dropdown-menu, .category-card {
            background: var(--glass-card) !important;
            backdrop-filter: blur(32px) saturate(160%) !important;
            -webkit-backdrop-filter: blur(32px) saturate(160%) !important;
            border-top: 1px solid var(--glass-border-top) !important;
            border-left: 1px solid var(--glass-border-left) !important;
            border-right: 1px solid var(--glass-border-flat) !important;
            border-bottom: 1px solid var(--glass-border-flat) !important;
            box-shadow: var(--shadow-lux) !important;
            border-radius: 24px !important;
            padding: 1.75rem !important;
            overflow: hidden !important;
            transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        .dropdown-menu { z-index: 100000 !important; padding: 0.5rem !important; border-radius: 18px !important; }

        .project-card:hover, .category-card:hover, .stat-card:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            transform: translateY(-5px) !important;
        }
        body.light-mode .project-card:hover, 
        body.light-mode .category-card:hover, 
        body.light-mode .stat-card:hover {
            background: rgba(0, 0, 0, 0.03) !important;
        }

        /* Fix Total Masalah Teks Pudar Di Samping Kaca */
        .text-slate-400, .text-slate-300, .text-slate-200 {
            color: var(--text-body) !important;
            opacity: 0.75;
        }
        .text-slate-500 {
            color: var(--text-body) !important;
            opacity: 0.55;
        }

        /* =============================================
           CATEGORY CARD DESIGN PRESISI INDEPENDEN
           ============================================= */
        .category-card {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            text-align: center !important;
        }

        .category-card .w-12.h-12, .category-card [class*="w-12"] {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            flex-shrink: 0 !important;
            width: 3.75rem !important;
            height: 3.75rem !important;
            border-radius: 50% !important;
            margin: 0 auto 1rem auto !important;
            border: 1px solid var(--input-border) !important;
            background: transparent !important;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }
        .category-card:hover .w-12.h-12 { transform: scale(1.1) !important; }

        .category-card svg, .category-card i, .category-card [class*="w-12"] svg {
            display: block !important;
            margin: auto !important;
            width: 1.5rem !important;
            height: 1.5rem !important;
            color: var(--text-body) !important;
            stroke: var(--text-body) !important;
        }

        /* =============================================
           CONTROLS FIXES (BUTTONS & INPUT FIELDS)
           ============================================= */
        .btn-primary {
            background: var(--text-body) !important;
            color: var(--bg-body) !important;
            border: 1px solid var(--text-body) !important;
            font-weight: 700 !important;
            border-radius: 14px !important;
            padding: 0.75rem 1.5rem !important;
            transition: var(--transition-smooth) !important;
        }
        .btn-primary:hover {
            background: transparent !important;
            color: var(--text-body) !important;
        }

        .btn-secondary {
            background: var(--input-fill) !important;
            color: var(--text-body) !important;
            border: 1px solid var(--input-border) !important;
            border-radius: 14px !important;
            padding: 0.75rem 1.5rem !important;
        }

        /* Input Form Anti-Clash System */
        .form-input {
            width: 100% !important;
            border-radius: 14px !important;
            padding: 0.8rem 1.25rem !important;
            background: var(--input-fill) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-body) !important;
        }
        .form-input:focus { outline: 1px solid var(--text-body) !important; }
        .form-input::placeholder { color: var(--text-body) !important; opacity: 0.4; }

        .dropdown-item {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 11px 16px !important;
            color: var(--text-body) !important;
            background: transparent !important;
            border-radius: 12px !important;
            width: calc(100% - 12px) !important;
            margin: 4px 6px !important;
            transition: background 0.2s ease !important;
        }
        .dropdown-item:hover { background: rgba(255, 255, 255, 0.1) !important; }
        body.light-mode .dropdown-item:hover { background: rgba(0, 0, 0, 0.05) !important; }

        /* Cleanup system utilities */
        .hero-grid { display: none !important; }
        .fade-in { animation: iosPop 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes iosPop {
            from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
            to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-navy-950 text-slate-200 min-h-screen flex flex-col font-sans antialiased selection:bg-cyan-500/30 selection:text-cyan-200 transition-colors duration-700">

    <div class="hero-grid"></div>

    <nav id="navbar" class="fixed top-0 w-full glass-nav transition-all duration-500"></nav>

    <main id="app-root" class="flex-grow pt-24 pb-12"></main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-3"></div>
    
    <div id="modal-overlay" class="fixed inset-0 bg-navy-950/40 backdrop-blur-md z-[70] hidden items-center justify-center p-4 transition-all duration-300">
        <div id="modal-body" class="w-full max-w-lg transform scale-95 opacity-0 transition-all duration-300"></div>
    </div>

    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const originalRenderNav = UI.renderNav;
            UI.renderNav = function() {
                originalRenderNav.apply(this, arguments);
                
                const navRight = document.querySelector('.nav-container .flex.items-center.gap-2') || 
                                 document.querySelector('.nav-container .flex.items-center.gap-3');
                
                if (navRight && !document.getElementById('theme-toggle-btn')) {
                    const btn = document.createElement('button');
                    btn.id = 'theme-toggle-btn';
                    btn.className = 'w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/20 border border-white/10 transition-all backdrop-blur-md ml-1 sm:ml-2';
                    
                    const isLight = document.body.classList.contains('light-mode');
                    btn.innerHTML = isLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400"></i>';
                    
                    btn.onclick = () => {
                        document.body.classList.toggle('light-mode');
                        const nowLight = document.body.classList.contains('light-mode');
                        btn.innerHTML = nowLight ? '<i data-lucide="sun" class="w-4 h-4 text-amber-500 drop-shadow-md"></i>' : '<i data-lucide="moon" class="w-4 h-4 text-cyan-400 drop-shadow-md"></i>';
                        btn.style.borderColor = nowLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';
                        btn.style.background = nowLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
                        lucide.createIcons({nodes: [btn]});
                        localStorage.setItem('itconnect_theme', nowLight ? 'light' : 'dark');
                    };
                    
                    navRight.insertBefore(btn, navRight.firstChild);
                    lucide.createIcons({nodes: [btn]});
                }
            };

            const originalModal = UI.modal;
            UI.modal = function(content, opts) {
                originalModal.apply(this, arguments);
                setTimeout(() => {
                    document.getElementById('modal-body').classList.remove('scale-95', 'opacity-0');
                    document.getElementById('modal-body').classList.add('scale-100', 'opacity-100');
                }, 10);
            };

            const originalCloseModal = UI.closeModal;
            UI.closeModal = function() {
                document.getElementById('modal-body').classList.remove('scale-100', 'opacity-100');
                document.getElementById('modal-body').classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    originalCloseModal.apply(this, arguments);
                }, 300);
            };

            if (localStorage.getItem('itconnect_theme') === 'light') {
                document.body.classList.add('light-mode');
            }

            App.init();
        });
    </script>
</body>
</html>
