<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect — Marketplace Jasa IT Mahasiswa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* =====================================================================
           ITCONNECT — LIQUID GLASS iOS 26.5 PREMIUM ULTRA DESIGN SYSTEM
           Refined for Ultimate High-Fidelity Professional Presentation
           ===================================================================== */

        :root {
            --bg-void:          #020204;
            --bg-base:          #060609;
            --glass-sm:         rgba(255, 255, 255, 0.03);
            --glass-md:         rgba(255, 255, 255, 0.06);
            --glass-lg:         rgba(255, 255, 255, 0.10);
            --glass-border:     rgba(255, 255, 255, 0.08);
            --glass-border-md:  rgba(255, 255, 255, 0.14);
            --glass-shine:      rgba(255, 255, 255, 0.18);
            --cyan:             #00d4ff;
            --cyan-glow:        rgba(0, 212, 255, 0.25);
            --cyan-dim:         rgba(0, 212, 255, 0.08);
            --violet:           #8b5cf6;
            --violet-glow:      rgba(139, 92, 246, 0.22);
            --violet-dim:       rgba(139, 92, 246, 0.08);
            --green:            #34d399;
            --amber:            #fbbf24;
            --red:              #f87171;
            --text-1:           #f5f5f7;
            --text-2:           #a1a1aa;
            --text-3:           #52525b;
            --ease-spring:      cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out:         cubic-bezier(0.4, 0, 0.2, 1);
            --r-sm: 10px; --r-md: 14px; --r-lg: 20px; --r-xl: 26px; --r-pill: 999px;
        }

        /* ─── RESET & BASE ────────────────────────────────────────────────── */
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            background-color: var(--bg-void);
            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0, 212, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 45% at 80% 40%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse 70% 50% at 50% 110%, rgba(0, 212, 255, 0.04) 0%, transparent 55%);
            color: var(--text-1);
            font-family: 'Sora', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Ambient Grain Noise Overlay */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.90' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }

        /* ─── FIXED NAVBAR ENGINE ─────────────────────────────────────────── */
        #navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 72px; z-index: 9999;
            background: rgba(4, 4, 6, 0.70);
            backdrop-filter: blur(40px) saturate(210%) brightness(1.05);
            -webkit-backdrop-filter: blur(40px) saturate(210%) brightness(1.05);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center;
        }
        #navbar::after {
            content: '';
            position: absolute; bottom: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.25) 20%, rgba(139,92,246,0.25) 80%, transparent 100%);
        }

        .nav-container {
            max-width: 1340px; margin: 0 auto; padding: 0 24px; width: 100%;
            display: flex; align-items: center; justify-content: space-between; gap: 20px;
        }
        .nav-left  { display: flex; align-items: center; flex: 1; min-width: 0; }
        .nav-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

        /* Logo Horizon Layout Alignment */
        .nav-logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; flex-shrink: 0;
        }
        .logo-icon {
            width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
            background: linear-gradient(135deg, #00d4ff 0%, #8b5cf6 100%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.8rem; color: #020204; letter-spacing: 0.02em;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.35);
        }
        .logo-text {
            font-weight: 700; font-size: 1.35rem; color: var(--text-1); letter-spacing: -0.03em;
            white-space: nowrap; line-height: 1; display: inline-block;
        }
        .logo-text span { 
            background: linear-gradient(90deg, #00d4ff, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Center Control Navigation Dock */
        .nav-dock {
            display: flex; align-items: center; gap: 4px;
            background: var(--glass-sm); border: 1px solid var(--glass-border);
            border-radius: var(--r-pill); padding: 5px 8px; backdrop-filter: blur(20px);
            margin-left: 36px;
        }
        .nav-dock-link {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 16px; border-radius: var(--r-pill);
            color: var(--text-2); font-size: 0.85rem; font-weight: 500;
            text-decoration: none; letter-spacing: -0.01em;
            transition: color 150ms var(--ease-out), background 150ms var(--ease-out);
            white-space: nowrap;
        }
        .nav-dock-link:hover { color: var(--text-1); background: var(--glass-md); }
        .nav-dock-link.active { color: var(--cyan); background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.12); }
        .nav-dock-link svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* UI Action Systems */
        .btn-nav-ghost {
            padding: 8px 18px; border-radius: var(--r-md);
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--text-2); font-size: 0.85rem; font-weight: 500;
            cursor: pointer; font-family: inherit; letter-spacing: -0.01em;
            transition: all 120ms var(--ease-out); text-decoration: none;
            display: inline-flex; align-items: center;
        }
        .btn-nav-ghost:hover { background: var(--glass-sm); color: var(--text-1); border-color: var(--glass-border-md); }
        
        .btn-nav-primary {
            padding: 8px 20px; border-radius: var(--r-md);
            background: linear-gradient(135deg, #00d4ff, #0ea5e9);
            border: none; color: #020204; font-size: 0.85rem; font-weight: 700;
            cursor: pointer; font-family: inherit; letter-spacing: -0.01em;
            transition: all 150ms var(--ease-out); text-decoration: none;
            display: inline-flex; align-items: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.25);
        }
        .btn-nav-primary:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(0, 212, 255, 0.45); }

        .icon-btn {
            position: relative; width: 38px; height: 38px; border-radius: var(--r-md);
            background: var(--glass-sm); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-2); flex-shrink: 0;
            transition: all 120ms var(--ease-out);
        }
        .icon-btn:hover { background: var(--glass-md); border-color: var(--glass-border-md); color: var(--text-1); }
        .icon-btn svg { width: 16px; height: 16px; }

        .notif-badge {
            position: absolute; top: -3px; right: -3px;
            min-width: 16px; height: 16px; padding: 0 4px;
            background: var(--red); border-radius: var(--r-pill);
            border: 2px solid var(--bg-void); font-size: 0.6rem; font-weight: 700;
            color: #fff; display: flex; align-items: center; justify-content: center;
        }

        /* ─── LIQUID GLASS PROFILE PILL ARROW CORE TRIGGER ───────────────── */
        .profile-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 6px; border-radius: var(--r-pill);
            background: var(--glass-sm); border: 1px solid var(--glass-border);
            position: relative; transition: all 150ms var(--ease-out);
            user-select: none;
        }
        .profile-pill:hover { background: var(--glass-md); border-color: var(--glass-border-md); }
        .profile-pill.open { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
        
        .p-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; color: #020204; flex-shrink: 0;
        }
        .p-name {
            font-size: 0.85rem; font-weight: 600; color: var(--text-1);
            letter-spacing: -0.01em; max-width: 100px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        
        /* Dedicated Micro-Interaction Dropdown Trigger Target Area */
        .p-chevron-trigger {
            display: flex; align-items: center; justify-content: center;
            width: 24px; height: 24px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer; transition: all 150ms var(--ease-out); flex-shrink: 0;
        }
        .p-chevron-trigger:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            color: var(--cyan);
        }
        .p-chevron {
            width: 12px; height: 12px; color: var(--text-2);
            transition: transform 220ms var(--ease-spring);
            stroke: currentColor; fill: none; stroke-width: 3;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .profile-pill.open .p-chevron { transform: rotate(180deg); color: var(--cyan); }

        /* ─── DROPDOWN MATRIX OVERLAY ────────────────────────────────────── */
        #profile-dropdown {
            position: absolute; top: calc(100% + 12px); right: 0; width: 265px;
            background: rgba(6, 6, 9, 0.92);
            backdrop-filter: blur(50px) saturate(170%) brightness(1.02);
            -webkit-backdrop-filter: blur(50px) saturate(170%) brightness(1.02);
            border: 1px solid var(--glass-border-md); border-radius: var(--r-xl);
            padding: 10px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.95), 0 0 0 1px rgba(255,255,255,0.02) inset;
            display: none; z-index: 999999;
            transform-origin: top right;
        }
        #profile-dropdown.active {
            display: block;
            animation: dropdown-unfurl 0.24s var(--ease-spring) both;
        }
        @keyframes dropdown-unfurl {
            from { opacity: 0; transform: scale(0.95) translateY(-8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .dd-header {
            padding: 12px 14px 12px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 8px;
        }
        .dd-name  { font-size: 0.9rem; font-weight: 700; color: var(--text-1); letter-spacing: -0.02em; }
        .dd-email { font-size: 0.75rem; color: var(--text-3); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dd-badge {
            display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
            padding: 3px 10px; border-radius: var(--r-pill);
            font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em;
        }
        .dd-badge-cyan   { background: var(--cyan-dim);   color: var(--cyan);   border: 1px solid rgba(0,212,255,0.18);   }
        .dd-badge-violet { background: var(--violet-dim); color: var(--violet); border: 1px solid rgba(139,92,246,0.18); }
        
        .dd-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; border-radius: var(--r-md);
            color: var(--text-2); font-size: 0.85rem; font-weight: 500;
            text-decoration: none; cursor: pointer; letter-spacing: -0.01em;
            transition: all 120ms var(--ease-out);
            border: none; background: none; width: 100%;
            font-family: inherit; text-align: left;
        }
        .dd-item:hover { background: var(--glass-md); color: var(--text-1); transform: translateX(2px); }
        .dd-item.danger:hover { background: rgba(248,113,113,0.12); color: var(--red); }
        
        .dd-icon {
            width: 28px; height: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .dd-icon svg { width: 14px; height: 14px; }
        .dd-icon-cyan   { background: var(--cyan-dim);   color: var(--cyan);   }
        .dd-icon-violet { background: var(--violet-dim); color: var(--violet); }
        .dd-icon-amber  { background: rgba(251,191,36,0.08);  color: var(--amber);  }
        .dd-icon-gray   { background: rgba(255,255,255,0.05); color: var(--text-2); }
        .dd-icon-red    { background: rgba(248,113,113,0.08); color: var(--red);    }
        .dd-divider { height: 1px; background: var(--glass-border); margin: 6px 0; }

        /* ─── APP ROOT STRUCTURE ──────────────────────────────────────────── */
        #app-root {
            padding-top: 108px; padding-bottom: 80px;
            max-width: 1340px; margin: 0 auto; width: 100%;
            padding-left: 24px; padding-right: 24px;
            flex: 1; position: relative; z-index: 1;
        }

        /* ─── LAYOUT VISUAL PANELS ────────────────────────────────────────── */
        .glass-card {
            background: var(--glass-sm);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            transition: border-color 200ms var(--ease-out), background-color 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
        }
        .glass-card:hover { border-color: var(--glass-border-md); background: var(--glass-md); }

        #modal-overlay {
            position: fixed; inset: 0; z-index: 99998;
            background: rgba(1, 1, 3, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: center;
        }

        #toast-container {
            position: fixed; bottom: 30px; right: 30px; z-index: 999999;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 20px; border-radius: var(--r-lg);
            background: rgba(4, 4, 6, 0.95);
            backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border-md);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.8);
            font-size: 0.88rem; font-weight: 500; color: var(--text-1);
            min-width: 300px; pointer-events: all;
            animation: toast-unfurl-in 0.28s var(--ease-spring) both;
        }
        .toast-exit { animation: toast-unfurl-out 0.2s var(--ease-out) both; }
        @keyframes toast-unfurl-in  { from { opacity: 0; transform: translateX(30px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes toast-unfurl-out { to { opacity: 0; transform: translateX(30px) scale(0.95); } }

        /* ─── SYSTEM ATOMIC BUTTONS ───────────────────────────────────────── */
        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, #00d4ff 0%, #0ea5e9 100%);
            color: #020204; font-weight: 700; border: none; cursor: pointer;
            font-family: inherit; letter-spacing: -0.01em; padding: 12px 24px; border-radius: var(--r-md);
            transition: all 150ms var(--ease-out); box-shadow: 0 4px 15px rgba(0, 212, 255, 0.15);
        }
        .btn-primary:hover { transform: translateY(-1.5px); box-shadow: 0 0 30px rgba(0, 212, 255, 0.4); }
        .btn-primary:active { transform: translateY(0); }
        
        .btn-secondary {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--glass-sm); border: 1px solid var(--glass-border);
            color: var(--text-1); font-weight: 500; cursor: pointer;
            font-family: inherit; letter-spacing: -0.01em; padding: 12px 24px; border-radius: var(--r-md);
            transition: all 120ms var(--ease-out);
        }
        .btn-secondary:hover { background: var(--glass-md); border-color: var(--glass-border-md); }

        /* ─── HIGH FIDELITY FORM FIELDS ──────────────────────────────────── */
        .form-group  { display: flex; flex-direction: column; gap: 8px; }
        .form-label  { font-size: 0.75rem; font-weight: 700; color: var(--text-2); letter-spacing: 0.05em; text-transform: uppercase; }
        .form-input  {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: var(--r-md); padding: 14px 18px;
            color: var(--text-1); font-family: inherit; font-size: 0.92rem; font-weight: 500;
            outline: none; transition: all 150ms var(--ease-out);
        }
        .form-input::placeholder { color: var(--text-3); }
        .form-input:focus { border-color: rgba(0, 212, 255, 0.45); background: var(--glass-sm); box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.08); }

        /* ─── GRID DECORATIONS ────────────────────────────────────────────── */
        .hero-grid {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 80%);
        }

        /* Professional Showrooms Elements */
        .project-card {
            background: var(--glass-sm); border: 1px solid var(--glass-border);
            border-radius: var(--r-xl); padding: 24px; cursor: pointer;
            display: flex; flex-direction: column; height: 100%;
            transition: all 250ms cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .project-card:hover { border-color: rgba(0, 212, 255, 0.35); background: var(--glass-md); transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }

        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: var(--r-pill); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.01em; }
        .badge-cyan   { background: var(--cyan-dim);               color: var(--cyan);   border: 1px solid rgba(0, 212, 255, 0.16); }
        .badge-violet { background: var(--violet-dim);             color: var(--violet); border: 1px solid rgba(139, 92, 246, 0.16); }
        .badge-green  { background: rgba(52, 211, 153, 0.08);       color: var(--green);  border: 1px solid rgba(52, 211, 153, 0.15); }
        .badge-amber  { background: rgba(251, 191, 36, 0.08);       color: var(--amber);  border: 1px solid rgba(251, 191, 36, 0.15); }
        .badge-red    { background: rgba(248, 113, 113, 0.08);      color: var(--red);    border: 1px solid rgba(248, 113, 113, 0.15); }

        /* Scrollbar Systems */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.22); }

        footer {
            position: relative; z-index: 2; margin-top: auto;
            border-top: 1px solid var(--glass-border);
            padding: 32px 24px; color: var(--text-3); font-size: 0.85rem;
            background: rgba(2,2,4,0.6); backdrop-filter: blur(20px);
        }
        footer a { color: var(--text-3); text-decoration: none; transition: color 150ms; }
        footer a:hover { color: var(--text-2); }

        @media (max-width: 968px) {
            .nav-dock { display: none; }
        }
        @media (max-width: 540px) {
            .p-name { display: none; }
            #toast-container { left: 20px; right: 20px; bottom: 20px; }
            .toast-item { min-width: unset; }
            #navbar { height: 66px; }
            #app-root { padding-top: 90px; padding-left: 16px; padding-right: 16px; }
        }

        #mobile-menu { background: rgba(4, 4, 6, 0.98); border-top: 1px solid var(--glass-border); backdrop-filter: blur(30px); }
        .mobile-nav-link { display: flex; align-items: center; gap: 14px; padding: 14px 18px; color: var(--text-2); font-size: 0.92rem; font-weight: 500; text-decoration: none; border-radius: var(--r-md); transition: all 120ms; }
        .mobile-nav-link:hover { background: var(--glass-sm); color: var(--text-1); }
    </style>
</head>
<body>

    <!-- ====================================================================
         DYNAMIC FIXED NAVBAR HUB
         ==================================================================== -->
    <nav id="navbar">
        <div class="nav-container" id="navbar-inner">
            <!-- Rendered Reactively via UI.renderNav() inside ui.js -->
        </div>
    </nav>

    <!-- ====================================================================
         GLOBAL MODAL SYSTEM CONTAINER
         ==================================================================== -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[99998]" style="display:none;">
        <div id="modal-body" class="w-full max-w-2xl mx-auto flex items-center justify-center"></div>
    </div>

    <!-- ====================================================================
         MAIN VIEWPORT APPLICATION ROOT
         ==================================================================== -->
    <div class="relative w-full overflow-hidden min-height-screen flex flex-col">
        <div class="hero-grid"></div>
        <main id="app-root"></main>
    </div>

    <!-- ====================================================================
         MICRO-INTERACTION TOAST ENGINE
         ==================================================================== -->
    <div id="toast-container"></div>

    <!-- ====================================================================
         PREMIUM BUSINESS FOOTER SYSTEM
         ==================================================================== -->
    <footer>
        <div style="max-width:1340px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px;">

    <!-- ====================================================================
         INTERACTION EVENTS & DOM ROUTING LIFECYCLE
         ==================================================================== -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {

        /* 1. INITIALIZE SYSTEM STATE */
        if (typeof App !== 'undefined') App.init();

        /* 2. LIQUID GLASS INTERACTIVE DROPDOWN ENGINE */
        document.addEventListener('click', (e) => {
            const pillBtn = document.getElementById('profile-pill-btn');
            const dropdown = document.getElementById('profile-dropdown');
            const chevronTrigger = e.target.closest('.p-chevron-trigger');
            
            if (!pillBtn || !dropdown) return;

            // Explicitly verify the strict requirement: open only when the dedicated chevron trigger button is pressed
            if (chevronTrigger && pillBtn.contains(chevronTrigger)) {
                e.stopPropagation();
                const isOpen = dropdown.classList.toggle('active');
                pillBtn.classList.toggle('open', isOpen);
                pillBtn.setAttribute('aria-expanded', String(isOpen));
            } else if (!dropdown.contains(e.target)) {
                // Clicking completely outside or on the main body of the pill closes the dropdown panel safely
                dropdown.classList.remove('active');
                pillBtn.classList.remove('open');
                pillBtn.setAttribute('aria-expanded', 'false');
            }
        });

        /* 3. HARDWARE ACCELERATED KEYBOARD ACCESSIBILITY CLOSURES */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('profile-dropdown')?.classList.remove('active');
                document.getElementById('profile-pill-btn')?.classList.remove('open');
            }
        });

        /* 4. SEAMLESS DOCK HIGH LIGHT STATE RE-SYNCHRONIZATION */
        function syncActive() {
            const currentHash = window.location.hash || '#/';
            document.querySelectorAll('.nav-dock-link').forEach(link => {
                link.classList.toggle('active', link.getAttribute('href') === currentHash);
            });
        }
        window.addEventListener('hashchange', syncActive);
        syncActive();

        /* 5. HEURISTIC ENGINE FOR POLL CONTEXT FOR DYNAMIC RENDER LUCIDE ICONS */
        setInterval(() => { 
            if (window.lucide && typeof lucide.createIcons === 'function') {
                lucide.createIcons(); 
            } 
        }, 700);

    });
    </script>
