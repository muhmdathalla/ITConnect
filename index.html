<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITConnect - Marketplace Jasa IT Mahasiswa</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a', 950: '#020617' } }
                }
            }
        }
    </script>
    
    <style>
        /* =============================================
           1. CORE RESETS (PURE DARK MODE)
           ============================================= */
        *, *::before, *::after { 
            box-sizing: border-box !important; 
        }

        body {
            background-color: #000000 !important;
            color: #ffffff !important;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Hilangkan sisa warna warni bawaan JS, paksa monokrom elegan */
        .gradient-text, .text-cyan-400, .text-blue-400, .text-purple-400 {
            background: none !important;
            -webkit-text-fill-color: #ffffff !important;
            color: #ffffff !important;
        }
        .bg-cyan-500\/10, .bg-blue-500\/10 { background-color: rgba(255, 255, 255, 0.05) !important; }
        .border-cyan-500\/30, .border-blue-500\/30 { border-color: rgba(255, 255, 255, 0.15) !important; }

        /* =============================================
           2. NAVBAR & DROPDOWN MENU (FIX OVERLAP)
           ============================================= */
        nav#navbar {
            z-index: 99999 !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.65) !important;
            backdrop-filter: blur(40px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(40px) saturate(180%) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
        }

        .nav-container {
            max-width: 72rem !important;
            margin: 0 auto !important;
            padding: 0 1.5rem !important;
            height: 4.5rem !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            width: 100% !important;
        }

        .nav-logo {
            display: flex !important;
            align-items: center !important;
            gap: 0.6rem !important;
            font-weight: 800 !important;
            font-size: 1.25rem !important;
            letter-spacing: -0.03em !important;
            color: #ffffff !important;
            text-decoration: none !important;
        }

        .nav-link {
            color: #e2e8f0 !important;
            font-weight: 500 !important;
            transition: color 0.3s ease !important;
        }
        .nav-link:hover { color: #ffffff !important; }

        /* FIX FATAL: Dropdown Menu Anti Tembus Pandang */
        .dropdown-menu {
            z-index: 100000 !important;
            background: rgba(18, 18, 18, 0.95) !important; /* Dibuat sangat pekat */
            backdrop-filter: blur(48px) saturate(200%) !important;
            -webkit-backdrop-filter: blur(48px) saturate(200%) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 18px !important;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9) !important;
            padding: 0.5rem !important;
            margin-top: 0.5rem !important;
        }

        .dropdown-item {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            padding: 12px 16px !important;
            color: #f8fafc !important;
            background: transparent !important;
            border-radius: 12px !important;
            width: calc(100% - 8px) !important;
            margin: 4px !important;
            font-weight: 500 !important;
            transition: background 0.2s ease !important;
        }
        .dropdown-item:hover { background: rgba(255, 255, 255, 0.1) !important; }

        /* =============================================
           3. MAXIMUM LIQUID GLASS CARDS
           ============================================= */
        .glass-card, .project-card, .stat-card, .category-card {
            background: rgba(20, 20, 20, 0.45) !important;
            backdrop-filter: blur(32px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(32px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.18) !important; /* Highlight Kaca Khas Apple */
            border-radius: 24px !important;
            padding: 1.5rem !important; /* Ruang bernapas */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6) !important;
            overflow: hidden !important; /* Cegah teks keluar kotak */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s ease !important;
        }

        .glass-card:hover, .project-card:hover, .stat-card:hover {
            background: rgba(30, 30, 30, 0.6) !important;
            transform: translateY(-5px) !important;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8) !important;
        }

        /* =============================================
           4. CATEGORY CARD (GRID/FLEX FIX)
           ============================================= */
        .category-card {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            text-align: center !important;
        }

        .category-card .w-12.h-12, .category-card [class*="w-12"] {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            flex-shrink: 0 !important;
            width: 4rem !important;
            height: 4rem !important;
            border-radius: 50% !important;
            margin: 0 auto 1.25rem auto !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            background: rgba(255, 255, 255, 0.05) !important;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        .category-card:hover .w-12.h-12 {
            transform: scale(1.1) !important;
            background: rgba(255, 255, 255, 0.1) !important;
        }

        .category-card svg, .category-card i {
            display: block !important;
            margin: auto !important;
            width: 1.5rem !important;
            height: 1.5rem !important;
            color: #ffffff !important;
            stroke: #ffffff !important;
        }

        /* =============================================
           5. BUTTONS & INPUTS (PURE PROFESSIONAL)
           ============================================= */
        .btn-primary {
            background: #ffffff !important;
            color: #000000 !important;
            border: none !important;
            font-weight: 700 !important;
            border-radius: 14px !important;
            padding: 0.8rem 1.5rem !important;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease !important;
        }
        .btn-primary:hover {
            background: #e2e8f0 !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2) !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08) !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 14px !important;
            padding: 0.8rem 1.5rem !important;
            transition: all 0.3s ease !important;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15) !important; }

        .form-input {
            width: 100% !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: #ffffff !important;
            border-radius: 14px !important;
            padding: 0.85rem 1.25rem !important;
            transition: all 0.3s ease !important;
        }
        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.4) !important;
            background: rgba(255, 255, 255, 0.08) !important;
            outline: none !important;
        }
        .form-input::placeholder { color: rgba(255, 255, 255, 0.4) !important; }

        /* =============================================
           6. MICROINTERACTIONS & CLEANUP
           ============================================= */
        .hero-grid { display: none !important; } /* Buang grid berisik */
        
        .fade-in { animation: iosPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes iosPop {
            from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
            to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased selection:bg-white/20 selection:text-white">

    <nav id="navbar" class="glass-nav transition-all duration-500"></nav>

    <main id="app-root" class="flex-grow pt-24 pb-12"></main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-3"></div>
    
    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[70] hidden items-center justify-center p-4 transition-all duration-300">
        <div id="modal-body" class="w-full max-w-lg transform scale-95 opacity-0 transition-all duration-300"></div>
    </div>

    <script src="store.js"></script>
    <script src="ui.js"></script>
    <script src="home.js"></script>
    <script src="authView.js"></script>
    <script src="dashboard.js"></script>
    <script src="browse.js"></script>
    <script src="about.js"></script>
    <script src="postProject.js"></script>
    <script src="project.js"></script>
    <script src="profile.js"></script>
    <script src="messages.js"></script>
    <script src="payment.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Modal Animation Injection
            const originalModal = UI.modal;
            UI.modal = function(content, opts) {
                originalModal.apply(this, arguments);
                setTimeout(() => {
                    document.getElementById('modal-body').classList.remove('scale-95', 'opacity-0');
                    document.getElementById('modal-body').classList.add('scale-100', 'opacity-100');
                }, 10);
            };

            const originalCloseModal = UI.closeModal;
            UI.closeModal = function() {
                document.getElementById('modal-body').classList.remove('scale-100', 'opacity-100');
                document.getElementById('modal-body').classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    originalCloseModal.apply(this, arguments);
                }, 300);
            };

            // Start the App
            App.init();
        });
    </script>
</body>
</html>
